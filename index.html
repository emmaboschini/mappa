    <style>
        :root {
            --med-orange: #FF5B00;
            --med-blue: #00235D;
            --med-light-blue: #009EE0;
            --med-white: #FFFFFF;
            --med-dark: #001a44;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--med-blue);
            color: var(--med-white);
        }

        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            background: rgba(0, 35, 93, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--med-light-blue);
        }

        .zoom-controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 40px;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            background-color: var(--med-orange);
            color: var(--med-white);
            border: none;
            border-radius: 4px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .zoom-btn:hover {
            opacity: 0.8;
        }

        select {
            background-color: var(--med-white);
            color: var(--med-blue);
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            outline: none;
        }

        .country-path {
            fill: var(--med-dark);
            stroke: var(--med-light-blue);
            stroke-width: 0.5;
        }

        .marker {
            fill: var(--med-orange);
            stroke: var(--med-white);
            stroke-width: 1;
            cursor: pointer;
            transition: r 0.2s ease-in-out, fill 0.2s;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 35, 93, 0.9);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 3000;
            border: 1px solid var(--med-light-blue);
            white-space: nowrap;
        }

        .tooltip i {
            margin-left: 5px;
            font-size: 10px;
            color: var(--med-orange);
        }

        .popup {
            position: absolute;
            background: var(--med-white);
            color: var(--med-blue);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: all;
            min-width: 180px;
            display: none;
            z-index: 2000;
        }

        .popup h3 {
            margin: 0 0 10px 0;
            font-size: 1.2em;
            color: var(--med-blue);
            border-bottom: 2px solid var(--med-orange);
            padding-bottom: 5px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 4px;
            background-color: var(--med-orange);
            color: var(--med-white);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.2s;
            gap: 10px;
        }

        .social-btn i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }

        .social-btn:hover {
            opacity: 0.8;
        }

        .close-popup {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            font-size: 24px;
            color: var(--med-blue);
            line-height: 1;
        }

        #zoom-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.8em;
            opacity: 0.7;
            pointer-events: none;
        }
    </style>

    <div id="controls">
        <div class="filter-group">

                <option value="all">Tutte le Regioni</option>
            </select>
        </div>
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoom-in" title="Aumenta zoom">+</button>
            <button class="zoom-btn" id="zoom-out" title="Diminuisci zoom">-</button>
        </div>
    </div>

    <div id="map-container">
        <svg id="map"></svg>

        const svg = d3.select("#map");
        const g = svg.append("g");
        const container = document.getElementById("map-container");
        
        let width = container.clientWidth;
        let height = container.clientHeight;
        
        svg.attr("width", width).attr("height", height);

        const projection = d3.geoMercator()
            .center([15, 48]) // Slightly higher center to match the framing
            .scale(width * 2.2) 
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        const zoom = d3.zoom()
            .scaleExtent([0.5, 40])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
                // Maintain marker size
                g.selectAll(".marker")
                    .attr("r", 5 / event.transform.k)
                    .attr("stroke-width", 1 / event.transform.k);
                g.selectAll(".country-path")
                    .attr("stroke-width", 0.5 / event.transform.k);
                g.selectAll(".region-path")
                    .attr("stroke-width", 0.3 / event.transform.k);
            });

        svg.call(zoom);

        // Zoom button logic
        d3.select("#zoom-in").on("click", () => {
            svg.transition().duration(300).call(zoom.scaleBy, 1.5);
        });

        d3.select("#zoom-out").on("click", () => {
            svg.transition().duration(300).call(zoom.scaleBy, 0.6);
        });

            // Draw World
            const countries = topojson.feature(world, world.objects.countries);
            
            // Morocco (504) and Western Sahara (732) often need to be unified
            // We filter them out of the main set and draw them as a single merged feature
            const moroccoIds = [504, 732];
            const otherCountries = countries.features.filter(d => !moroccoIds.includes(+d.id));
            const moroccoFeatures = countries.features.filter(d => moroccoIds.includes(+d.id));
            
            // Draw all other countries
            g.selectAll(".country-path")
                .data(otherCountries)
                .enter().append("path")
                .attr("class", "country-path")
                .attr("d", path);

            // Draw Unified Morocco
            if (moroccoFeatures.length > 0) {
                const unifiedMorocco = topojson.merge(world, world.objects.countries.geometries.filter(d => moroccoIds.includes(+d.id)));
                g.append("path")
                    .datum(unifiedMorocco)
                    .attr("class", "country-path")
                    .attr("d", path);
            }

            // Markers
            const markers = g.selectAll(".marker")
                .data(locations)
                .enter().append("circle")
                .attr("class", "marker")
                .attr("cx", d => projection([d.lon, d.lat])[0])
                .attr("cy", d => projection([d.lon, d.lat])[1])
                .attr("r", 5)
                .on("mouseover", (event, d) => showTooltip(event, d))
                .on("mousemove", (event) => moveTooltip(event))
                .on("mouseout", () => hideTooltip())
                .on("click", (event, d) => showPopup(event, d));

            // Tooltip Logic
            const tooltip = d3.select("#tooltip");

            function showTooltip(event, d) {
                let icons = "";
                if (d.mail) icons += '<i class="fas fa-envelope"></i>';
                if (d.fb) icons += '<i class="fab fa-facebook-f"></i>';
                if (d.ig) icons += '<i class="fab fa-instagram"></i>';
                if (d.x) icons += '<i class="fa-brands fa-x-twitter"></i>';
                
                tooltip.style("display", "block")
                    .html(`<strong>${d.name}</strong> ${icons}`);
                
                d3.select(event.currentTarget)
                    .transition()
                    .duration(200)
                    .attr("r", 8 / d3.zoomTransform(svg.node()).k)
                    .style("fill", config.colors.lightBlue);
            }

            function moveTooltip(event) {
                const [x, y] = d3.pointer(event, container);
                tooltip.style("left", (x + 15) + "px")
                    .style("top", (y - 15) + "px");
            }

            function hideTooltip() {
                tooltip.style("display", "none");
                markers.transition()
                    .duration(200)
                    .attr("r", 5 / d3.zoomTransform(svg.node()).k)
                    .style("fill", config.colors.orange);
            }

            // Populate Filters
            const countriesList = [...new Set(locations.map(d => d.country))].sort();
            const regionsList = [...new Set(locations.filter(d => d.region).map(d => d.region))].sort();

            const countrySelect = d3.select("#country-filter");
            countriesList.forEach(c => countrySelect.append("option").text(c).attr("value", c));

            const regionSelect = d3.select("#region-filter");
            regionsList.forEach(r => regionSelect.append("option").text(r).attr("value", r));

            // Filter Logic
            function updateFilters() {
                const selectedCountry = countrySelect.property("value");
                const selectedRegion = regionSelect.property("value");

                markers.style("display", d => {
                    const countryMatch = selectedCountry === "all" || d.country === selectedCountry;
                    const regionMatch = selectedRegion === "all" || d.region === selectedRegion;
                    return (countryMatch && regionMatch) ? "block" : "none";
                });

                hidePopup();
            }

            countrySelect.on("change", updateFilters);
            regionSelect.on("change", updateFilters);

            // Popup Logic
            function showPopup(event, d) {
                const popup = d3.select("#popup");
                const title = d3.select("#popup-title");
                const socials = d3.select("#popup-socials");

                title.text(d.name);
                socials.html("");

                if (d.mail) {
                    socials.append("a")
                        .attr("href", `mailto:${d.mail}`)
                        .attr("class", "social-btn")
                        .attr("title", "Email")
                        .html('<i class="fas fa-envelope"></i> Email');
                }
                if (d.fb) {
                    socials.append("a")
                        .attr("href", d.fb)
                        .attr("target", "_blank")
                        .attr("class", "social-btn")
                        .attr("title", "Facebook")
                        .html('<i class="fab fa-facebook-f"></i> Facebook');
                }
                if (d.ig) {
                    socials.append("a")
                        .attr("href", d.ig)
                        .attr("target", "_blank")
                        .attr("class", "social-btn")
                        .attr("title", "Instagram")
                        .html('<i class="fab fa-instagram"></i> Instagram');
                }
                if (d.x) {
                    socials.append("a")
                        .attr("href", d.x)
                        .attr("target", "_blank")
                        .attr("class", "social-btn")
                        .attr("title", "X")
                        .html('<i class="fa-brands fa-x-twitter"></i> X');
                }

                // Position popup
                const [x, y] = d3.pointer(event, container);

                // Show temporarily to get dimensions
                popup.style("display", "block")
                    .style("visibility", "hidden");

                const popupNode = popup.node();
                const popupWidth = popupNode.offsetWidth;
                const popupHeight = popupNode.offsetHeight;
                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;

                let left = x + 15;
                let top = y - popupHeight / 2; // Center vertically by default

                // Prevent overflow right
                if (left + popupWidth > containerWidth) {
                    left = x - popupWidth - 15;
                }

                // Prevent overflow bottom (Sicily issue)
                if (top + popupHeight > containerHeight) {
                    top = containerHeight - popupHeight - 15;
                }

                // Prevent overflow top
                if (top < 15) {
                    top = 15;
                }

                popup.style("visibility", "visible")
                    .style("left", left + "px")
                    .style("top", top + "px");

                event.stopPropagation();
                }
            function hidePopup() {
                d3.select("#popup").style("display", "none");
            }

            d3.select(".close-popup").on("click", hidePopup);
            svg.on("click", hidePopup);

            // Responsive
            window.addEventListener("resize", () => {
                width = container.clientWidth;
                height = container.clientHeight;
                svg.attr("width", width).attr("height", height);
                projection.translate([width / 2, height / 2]);
                g.selectAll(".country-path").attr("d", path);
                g.selectAll(".region-path").attr("d", path);
                g.selectAll(".marker")
                    .attr("cx", d => projection([d.lon, d.lat])[0])
                    .attr("cy", d => projection([d.lon, d.lat])[1]);
            });
        });
