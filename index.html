<html lang="it">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --med-orange: #e94e1b; --med-blue: #18407e; --med-light-blue: #aeddf2; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Quicksand', sans-serif; background-color: var(--med-light-blue); }
        #map { height: 100vh; width: 100%; background-color: var(--med-light-blue); }

        .filter-container {
            position: absolute; top: 20px; right: 20px; z-index: 10000;
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 220px;
            border: 3px solid var(--med-blue);
        }
        .filter-title { color: var(--med-orange); font-weight: 900; text-align: center; margin-bottom: 10px; font-size: 0.8rem; text-transform: uppercase; }
        select { width: 100%; padding: 8px; border-radius: 10px; border: 2px solid var(--med-blue); font-family: inherit; font-weight: 700; color: var(--med-blue); outline: none; margin-bottom: 5px; }

        .city-label {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: var(--med-orange); font-weight: 900; font-size: 0.8rem;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
            white-space: nowrap; text-transform: uppercase;
        }

        .leaflet-popup-content-wrapper { border-radius: 15px; border: 3px solid var(--med-blue); padding: 0; }
        .popup-header { background: var(--med-blue); color: white; padding: 10px; text-align: center; font-weight: 700; border-radius: 10px 10px 0 0; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 10px; }
        .social-btn {
            display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 8px;
            text-decoration: none; color: white !important; font-size: 0.7rem; font-weight: 700;
            background-color: var(--med-blue);
        }

        /* Marker arancioni come pallini giganti e visibili */
        .marker-cluster div { background-color: var(--med-orange); color: white; font-weight: 900; border: 2px solid white; }
        .marker-cluster { background-color: rgba(233, 78, 27, 0.4); }

        @media (max-width: 600px) { .filter-container { width: calc(100% - 40px); top: auto; bottom: 20px; } }
    </style>
</head>
<body>

<div class="filter-container">
    <div class="filter-title">Equipaggi Terra</div>
    <select id="country-filter"><option value="all">Mondo</option></select>
    <select id="region-filter" style="display:none;"><option value="all">Regioni</option></select>

                pane: 'landPane',
                interactive: false,
                style: { fillColor: '#ffffff', fillOpacity: 1, color: '#18407e', weight: 1.5 }

    // Clustering forzato nel piano superiore
    const cluster = L.markerClusterGroup({ 
        showCoverageOnHover: false, maxClusterRadius: 40, clusterPane: 'markerPane' 
    });
    map.addLayer(cluster);

    function updateMap() {
        const cVal = document.getElementById('country-filter').value;
        const rVal = document.getElementById('region-filter').value;
        document.getElementById('region-filter').style.display = (cVal === "Italia") ? "block" : "none";
        
        cluster.clearLayers();
        const filtrati = dati.filter(e => (cVal === "all" || e.country === cVal) && (rVal === "all" || e.region === rVal));

        filtrati.forEach((e, idx) => {
            const popupHtml = `<div class="popup-header">${e.city}</div><div class="social-grid">` +
                (e.mail ? `<a href="mailto:${e.mail}" class="social-btn"><i class="fas fa-envelope"></i>Email</a>` : '') +
                (e.fb ? `<a href="${e.fb}" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i>FB</a>` : '') +
                (e.ig ? `<a href="${e.ig}" target="_blank" class="social-btn"><i class="fab fa-instagram"></i>IG</a>` : '') +
                (e.x ? `<a href="${e.x}" target="_blank" class="social-btn"><i class="fab fa-x-twitter"></i>X</a>` : '') +
                `</div>`;

            // Marker Circolare Vettoriale forzato nel piano 'markerPane'
            const m = L.circleMarker([e.lat, e.lng], {
                pane: 'markerPane', radius: 10, fillColor: "#e94e1b", color: "#ffffff", weight: 3, fillOpacity: 1
            }).bindPopup(popupHtml);

            // Nomi città forzati nel piano 'labelPane'
            m.bindTooltip(e.city, { 
                permanent: true, direction: ['top','bottom','left','right'][idx%4], className: 'city-label', offset: [0,0], pane: 'labelPane'
            });
            cluster.addLayer(m);
        });
        if (filtrati.length > 0) map.fitBounds(L.featureGroup(filtrati.map(e => L.marker([e.lat, e.lng]))).getBounds().pad(0.2));
    }

    // Inizializza Filtri
    const countries = [...new Set(dati.map(e => e.country))].sort();
    countries.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; document.getElementById('country-filter').appendChild(o); });
    const regions = [...new Set(dati.filter(e => e.country === "Italia").map(e => e.region))].sort();
    regions.forEach(r => { const o = document.createElement('option'); o.value = o.textContent = r; document.getElementById('region-filter').appendChild(o); });

    document.getElementById('country-filter').addEventListener('change', updateMap);
    document.getElementById('region-filter').addEventListener('change', updateMap);
    updateMap();
</script>
</body>
</html>
