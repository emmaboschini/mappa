<html lang="it">
<head>

    <!-- Leaflet CSS -->

    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --med-orange: #e94e1b;
            --med-blue: #18407e;
            --med-light-blue: #388ecd;
            --med-white: #ffffff;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        /* Popup Styling */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            padding: 5px;
            box-shadow: 0 3px 14px rgba(0,0,0,0.4);
        }
        .leaflet-popup-content {
            margin: 15px;
            min-width: 200px;
        }
        .popup-title {
            color: var(--med-blue);
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--med-orange);
            padding-bottom: 5px;
            text-align: center;
        }
        .social-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            transition: transform 0.2s, opacity 0.2s;
            border: none;
            cursor: pointer;
            background-color: var(--med-blue);
        }
        .social-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
            color: white;
            background-color: var(--med-light-blue);
        }
        
        .social-btn i {
            margin-right: 8px;
            font-size: 1.1rem;
        }
    </style>
</head>

<div id="map"></div>

    ];

    // Custom Icon (Mediterranean Orange)
    const medIcon = L.divIcon({
        html: '<i class="fa-solid fa-location-dot" style="color: var(--med-orange); font-size: 24px;"></i>',
        className: 'custom-div-icon',
        iconSize: [24, 24],
        iconAnchor: [12, 24],
        popupAnchor: [0, -24]
    });

    // Add markers to the map
    equipaggi.forEach(item => {
        let popupContent = `
            <div class="popup-title">${item.city}</div>
            <div class="social-buttons">
                ${item.mail ? `<a href="mailto:${item.mail}" class="social-btn btn-email" title="Email"><i class="fas fa-envelope"></i>Email</a>` : ''}
                ${item.fb ? `<a href="${item.fb}" target="_blank" class="social-btn btn-fb" title="Facebook"><i class="fab fa-facebook-f"></i>Facebook</a>` : ''}

            </div>
        `;

        L.marker([item.lat, item.lng], { icon: medIcon })
            .bindPopup(popupContent)
            .addTo(map);
    });
</script>

</body>
</html>
